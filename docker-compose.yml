# Local Postgres for Prisma (see README Getting Started).
# Run from repo root: docker compose up -d && docker compose logs -f db

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invested
    ports:
      - "5432:5432"
    volumes:
      - invested_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invested"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  invested_pg_data:
